includes:
  - ../benchmark_thesis.yaml

# Ablation A: learned policy and the regular crop-acceptance checks, without
# ranking/truncating the policy proposals before crop inference.
infer:
  roi_prefilter_enabled: false
  require_stop_for_acceptance: false

# Ablation runs only need the full-image reference and RL-SAHI result.
benchmark:
  budgeted_crop_counts: []
  include_fixed_grid_full: false
  include_gated_variants: false
  proposal_crop_count: 0
